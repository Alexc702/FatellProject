<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html, body {
      margin: 0;
      width: 1024px;
      height: 1024px;
      overflow: hidden;
      background: #1d2744;
      font-family: "PingFang SC", "Songti SC", serif;
    }
    .canvas {
      position: relative;
      width: 1024px;
      height: 1024px;
      background:
        radial-gradient(circle at 50% 38%, rgba(216,188,124,0.28) 0, rgba(216,188,124,0.10) 26%, rgba(29,39,68,0) 56%),
        linear-gradient(160deg, #1b243f 0%, #0f1220 100%);
      border-radius: 228px;
    }
    .ring {
      position: absolute;
      inset: 110px;
      border-radius: 999px;
      box-shadow: inset 0 0 0 24px rgba(216,188,124,0.18);
    }
    .core {
      position: absolute;
      inset: 230px;
      border-radius: 999px;
      background: linear-gradient(180deg, #f0e0b8 0%, #d4b16d 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1f1810;
      font-size: 360px;
      font-weight: 700;
      line-height: 1;
    }
    .caption {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 118px;
      text-align: center;
      color: rgba(255,255,255,0.82);
      font-size: 76px;
      letter-spacing: 4px;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="ring"></div>
    <div class="core">相</div>
    <div class="caption">FaceXiang</div>
  </div>
</body>
</html>
